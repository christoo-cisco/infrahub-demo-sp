---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimRoleGroupMapping
  data:
    # PE mappings
    - name: pe_arista_eos
      description: "Arista EOS PE devices"
      role: pe
      platform: arista_eos
      groups:
        - pe_arista_eos
        - pes
    
    - name: pe_cisco_iosxr
      description: "Cisco IOS-XR PE devices"
      role: pe
      platform: cisco_iosxr
      groups:
        - pe_cisco_iosxr
        - pes
    
    - name: pe_juniper_junos
      description: "Juniper Junos PE devices"
      role: pe
      platform: juniper_junos
      groups:
        - pe_juniper_junos
        - pes
    
    - name: pe_nokia_sros
      description: "Nokia SR OS PE devices"
      role: pe
      platform: nokia_sros
      groups:
        - pe_nokia_sros
        - pes
    
    # Core mappings
    - name: core_cisco_iosxr
      description: "Cisco IOS-XR Core devices"
      role: core
      platform: cisco_iosxr
      groups:
        - core_cisco_iosxr
