---
# Webhook to sync device group membership based on role + platform attributes.
#
# When a DcimDevice is created or updated, the webhook POSTs to the reconciliation
# service running in the device-group-reconciler Docker container on port 8050.
#
# Device group membership is auto-synced based on rules:
#   - role=pe + platform=arista_eos → pe_arista_eos + pes
#   - role=pe + platform=cisco_iosxr → pe_cisco_iosxr + pes
#   - role=pe + platform=juniper_junos → pe_juniper_junos + pes
#   - role=pe + platform=nokia_sros → pe_nokia_sros + pes
#   - role=core + platform=cisco_iosxr → core_cisco_iosxr
#   - role=pe (any platform) → pes
#
# Enabled by default; the reconciliation service is running in Docker Compose.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CoreWebhook
  data:
    - name: device-role-group-reconciler
      description: Sync DcimDevice group membership based on role and platform.
      url: "http://device-group-reconciler:8050/reconcile"
      enabled: true
      ssl_verify: false
      include_payload: true
      headers:
        - name: Content-Type
          value: application/json
      trigger_events:
        - created
        - updated
      target_list:
        - name: DcimDevice
