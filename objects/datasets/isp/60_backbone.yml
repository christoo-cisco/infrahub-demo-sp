---
# 4 PE Devices
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimDevice
  data:
    - name: pe-rdu-cisco
      status: active
      role: pe
      location: rdu
      platform: cisco_iosxr
      device_type: NCS-540
      asn: ["65000", "Backbone-AS"]
      member_of_groups:
        - pe_cisco_iosxr
        - pes
    - name: pe-rdu-juniper
      status: active
      role: pe
      location: rdu
      platform: juniper_junos
      device_type: MX204
      asn: ["65000", "Backbone-AS"]
      member_of_groups:
        - pe_juniper_junos
        - pes

---
# Loopback0 interfaces (one per PE) with embedded loopback IP addresses
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: InterfaceVirtual
  data:
    - name: Loopback0
      description: Router-ID / iBGP source
      mtu: 1500
      status: active
      role: management
      device: pe-rdu-cisco
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 1.1.1.2/32
            description: pe-rdu-cisco loopback
    - name: Loopback0
      description: Router-ID / iBGP source
      mtu: 1500
      status: active
      role: management
      device: pe-rdu-juniper
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 1.1.1.3/32
            description: pe-rdu-juniper loopback

---
# Backbone physical interfaces with embedded IP addresses (12 total for 6 p2p links)
# Naming: Ethernet1, Ethernet2, Ethernet3 on each PE (vendor-neutral for demo simplicity)
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: InterfacePhysical
  data:
    # pe-rdu-cisco
    - name: Ethernet1
      description: To pe-lon-arista
      mtu: 9000
      status: active
      role: core
      device: pe-rdu-cisco
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.1/31
    - name: Ethernet2
      description: To pe-ams-juniper
      mtu: 9000
      status: active
      role: core
      device: pe-rdu-cisco
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.6/31
    - name: Ethernet3
      description: To pe-par-nokia
      mtu: 9000
      status: active
      role: core
      device: pe-rdu-cisco
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.8/31
    # pe-rdu-juniper
    - name: Ethernet1
      description: To pe-lon-arista
      mtu: 9000
      status: active
      role: core
      device: pe-rdu-juniper
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.3/31
    - name: Ethernet2
      description: To pe-fra-cisco
      mtu: 9000
      status: active
      role: core
      device: pe-rdu-juniper
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.7/31
    - name: Ethernet3
      description: To pe-par-nokia
      mtu: 9000
      status: active
      role: core
      device: pe-rdu-juniper
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.10/31
    # Free customer-facing interfaces — allocated to L3VPN sites by the
    # generate_l3vpn generator (status=free is its allocation filter).
    # Four free interfaces per PE so the catalog can create multiple
    # L3VPNs without exhausting the pool.
    - {name: Ethernet4, description: Customer-facing (free), mtu: 1500, status: free, role: cust, device: pe-rdu-cisco}
    - {name: Ethernet5, description: Customer-facing (free), mtu: 1500, status: free, role: cust, device: pe-rdu-cisco}
    - {name: Ethernet6, description: Customer-facing (free), mtu: 1500, status: free, role: cust, device: pe-rdu-cisco}
    - {name: Ethernet7, description: Customer-facing (free), mtu: 1500, status: free, role: cust, device: pe-rdu-cisco}
    - {name: Ethernet4, description: Customer-facing (free), mtu: 1500, status: free, role: cust, device: pe-rdu-juniper}
    - {name: Ethernet5, description: Customer-facing (free), mtu: 1500, status: free, role: cust, device: pe-rdu-juniper}
    - {name: Ethernet6, description: Customer-facing (free), mtu: 1500, status: free, role: cust, device: pe-rdu-juniper}
    - {name: Ethernet7, description: Customer-facing (free), mtu: 1500, status: free, role: cust, device: pe-rdu-juniper}

---
# Backbone p2p prefixes (6 × /31 from 10.1.0.0/16)
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamPrefix
  data:
    - {prefix: 10.1.0.6/31, description: rdu-cisco <-> rdu-juniper, status: active, role: technical}

---
# ISIS processes
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: MplsIsisProcess
  data:
    - device: pe-rdu-cisco
      description: ISIS L2
      status: active
      area_id: "49.0001"
      level: level-2
      net_id: "49.0001.0100.0000.0002.00"
    - device: pe-rdu-juniper
      description: ISIS L2
      status: active
      area_id: "49.0001"
      level: level-2
      net_id: "49.0001.0100.0000.0003.00"

---
# LDP processes
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: MplsLdpProcess
  data:
    - device: pe-rdu-cisco
      description: LDP
      status: active
      router_id: "10.0.0.2"
    - device: pe-rdu-juniper
      description: LDP
      status: active
      router_id: "10.0.0.3"

---
# MP-BGP processes
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: MplsBgpProcess
  data:
    - device: pe-rdu-cisco
      description: MP-BGP VPNv4/v6
      status: active
      router_id: "10.0.0.2"
      address_families: ["vpnv4", "vpnv6"]
    - device: pe-rdu-juniper
      description: MP-BGP VPNv4/v6
      status: active
      router_id: "10.0.0.3"
      address_families: ["vpnv4", "vpnv6"]

---
# iBGP overlay sessions (6 pairs in full mesh, 12 RoutingBGPSession rows: one per direction)
# local_ip / remote_ip use bare HFID list: [address, namespace]
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: RoutingBGPSession
  data:
    # pe-rdu-cisco -> peers
    - description: rdu-cisco to rdu-juniper
      session_type: INTERNAL
      role: backbone
      device: pe-rdu-cisco
      local_as: ["65000", "Backbone-AS"]
      remote_as: ["65000", "Backbone-AS"]
      local_ip: ["1.1.1.2/32", "default"]
      remote_ip: ["1.1.1.3/32", "default"]
      status: active
    # pe-rdu-juniper -> peers
    - description: rdu-juniper to rdu-cisco
      session_type: INTERNAL
      role: backbone
      device: pe-rdu-juniper
      local_as: ["65000", "Backbone-AS"]
      remote_as: ["65000", "Backbone-AS"]
      local_ip: ["1.1.1.3/32", "default"]
      remote_ip: ["1.1.1.2/32", "default"]
      status: active