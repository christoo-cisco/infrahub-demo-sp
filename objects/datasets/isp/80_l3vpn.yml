---
# Customer-facing prefixes for the Kestrel Bank L3VPN.
# These represent the LAN behind each branch CE; the generator binds them
# to the VPN's VRF.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamPrefix
  data:
    - {prefix: 10.200.20.0/24, description: Kestrel Bank — Raleigh branch LAN, status: active, role: public}
    - {prefix: 10.200.30.0/24, description: Kestrel Bank — Durham branch LAN, status: active, role: public}

---
# ServiceL3Vpn + 4 branch sites (one per PE). Joining the l3vpns group
# fires generate_l3vpn, which materialises the VRF, RTs, PE-CE /30
# allocations, and PE-CE eBGP sessions.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ServiceL3Vpn
  data:
    - name: kestrel-bank-mpls
      description: Kestrel Bank branch MPLS VPN — interconnects four American branches over the RBB backbone.
      vpn_id: 100
      address_family: ipv4
      status: draft
      tenant:
        kind: OrganizationTenant
        data:
          name: kestrel-bank
      member_of_groups:
        - l3vpns
      sites:
        kind: ServiceL3VpnSite
        data:
          - name: raleigh-branch
            pe_device: pe-rdu-cisco
            customer_subnet: ["10.200.20.0/24", "default"]
            routing_protocol: ebgp
            bgp_peer_asn: 65101
          - name: durham-branch
            pe_device: pe-rdu-juniper
            customer_subnet: ["10.200.30.0/24", "default"]
            routing_protocol: ebgp
            bgp_peer_asn: 65101
