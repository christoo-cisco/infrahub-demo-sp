# Financial dataset MPLS backbone — 8 PE routers, all Arista cEOS.
#
# Topology: ring (pe-01..pe-08..pe-01) + cross-chords (01-05, 02-06, 03-07,
# 04-08) => 12 backbone p2p links, every PE degree 3 (partial mesh). iBGP is a
# full mesh (56 directional sessions). Generated data — see the demo docs for
# the topology diagram.
#
# NOTE: this file is generated deterministically; regenerate rather than
# hand-editing individual rows to keep the addressing plan consistent.
---
# 8 PE devices — all Arista cEOS (arista_eos / 7280R3)
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimDevice
  data:
